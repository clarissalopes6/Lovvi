<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lovvi - Login">
    <title>Login - Lovvi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <h1 class="page-title">Entrar na sua conta</h1>
            <p class="page-subtitle">Acesse seu perfil e veja seus matches</p>
        </header>

        <div class="login-card">
            <div id="loginMsg"></div>

            <form id="formLogin">
                <div class="form-row">
                    <div class="field">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="field">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
                    </div>
                </div>

                <div class="form-actions" style="flex-direction: column; gap: 0.75rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
                    <a href="/" class="btn btn-back" style="width: 100%;">Voltar para Home</a>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
