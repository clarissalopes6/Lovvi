<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lovvi - Plataforma de Relacionamento">
    <title th:text="${title}">Lovvi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Encontre conexoes reais no Lovvi</h1>
            <p class="hero-subtitle">Cadastre seu perfil, responda o teste e descubra matches com base em afinidade.</p>
            <div class="hero-actions">
                <a href="/login" class="btn btn-primary">Entrar no perfil existente</a>
                <a href="/cadastro" class="btn btn-outline">Cadastrar novo perfil</a>
            </div>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
