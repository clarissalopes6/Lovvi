spring.application.name=lovvi-app
server.port=8080

# Conexao principal: MySQL real, usando JDBC puro.
# Antes de iniciar, crie o banco lovvi_db no MySQL e execute:
#   src/main/resources/sql/schema.sql
#   src/main/resources/sql/data.sql
db.url=${DB_URL:jdbc:mysql://localhost:3306/lovvi_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
db.username=${DB_USER:root}
db.password=${DB_PASSWORD:root}
db.driver=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Logging
logging.level.com.lovvi=DEBUG
