spring.application.name=lovvi-app
server.port=8080

# Fallback para H2 em memória quando MySQL não estiver disponível
# Para produção, ajuste para o MySQL real e comente a URL abaixo.
# Exemplos:
# db.url=jdbc:mysql://localhost:3306/lovvi_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
# db.username=root
# db.password=root
# db.driver=com.mysql.cj.jdbc.Driver

db.url=jdbc:h2:mem:lovvi_db;DB_CLOSE_DELAY=-1;MODE=MySQL
db.username=sa
db.password=
db.driver=org.h2.Driver

# Logging
logging.level.com.lovvi=DEBUG
